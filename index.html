<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#111722">
  <title>Ninja vs Soldier</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section id="select-screen" class="screen is-visible">
    <div class="panel">
      <p class="eyebrow">1 VS 1 BATTLE</p>
      <h1>캐릭터 선택</h1>

      <div class="character-grid">
        <button class="character-card is-selected" data-character="ninja" type="button">
          <img src="assets/ninja/portrait/portrait.png" alt="닌자" onerror="this.style.display='none'">
          <strong>닌자</strong>
          <span>수리검 · 그림자 참격</span>
        </button>

        <button class="character-card" data-character="soldier" type="button">
          <img src="assets/soldier/portrait/portrait.png" alt="군인" onerror="this.style.display='none'">
          <strong>군인</strong>
          <span>소총 · 집중 사격</span>
        </button>
      </div>

      <button id="start-button" type="button">배틀 시작</button>
      <p class="hint">선택하지 않은 캐릭터는 AI 상대가 됩니다.</p>
    </div>
  </section>

  <section id="battle-screen" class="screen">
    <canvas id="game"></canvas>

    <header id="battle-hud">
      <div class="hud-player">
        <strong id="player-name">플레이어</strong>
        <div class="hud-bar"><span id="player-health-fill"></span></div>
      </div>

      <div id="round-label">VS</div>

      <div class="hud-player hud-player--right">
        <strong id="enemy-name">상대</strong>
        <div class="hud-bar"><span id="enemy-health-fill"></span></div>
      </div>
    </header>

    <div id="joystick" aria-label="가상 조이스틱">
      <div id="joystick-knob"></div>
    </div>

    <button id="skill-button" type="button">공격</button>
    <button id="ultimate-button" type="button">0%</button>

    <div id="status"></div>
  </section>

  <section id="result-screen" class="screen">
    <div class="panel panel--result">
      <p class="eyebrow">BATTLE RESULT</p>
      <h2 id="result-title">승리</h2>
      <button id="restart-button" type="button">다시 선택</button>
    </div>
  </section>

  <script src="game.js"></script>
</body>
</html>
