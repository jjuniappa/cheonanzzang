<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#101318">
  <title>Ninja Shuriken Prototype</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="game-wrap" aria-label="닌자 게임">
    <canvas id="game"></canvas>

    <section id="joystick" aria-label="이동 조이스틱">
      <div id="joystick-knob"></div>
    </section>

    <button id="skill-button" type="button" aria-label="수리검 발사">
      <span>수리검</span>
    </button>

    <aside id="asset-status"></aside>
  </main>

  <script src="assets-manifest.js"></script>
  <script src="game.js"></script>
</body>
</html>
