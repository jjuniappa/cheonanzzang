<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>Ninja Mobile Controller</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="game" id="game" aria-label="닌자 캐릭터 조작 화면">
    <div class="actor" id="actor">
      <img
        id="ninja"
        class="ninja"
        src="./assets/ninja/idle/01.png"
        alt="닌자 캐릭터"
        draggable="false"
      />
      <div class="shadow" aria-hidden="true"></div>
    </div>

    <div class="joystick" id="joystick" aria-label="이동 조이스틱">
      <div class="joystick-knob" id="joystickKnob"></div>
    </div>

    <button id="shurikenButton" class="skill-button" type="button" aria-label="수리검 스킬 사용">
      <span class="skill-icon" aria-hidden="true">✦</span>
      <span class="skill-name">수리검</span>
    </button>
  </main>

  <script src="./game.js"></script>
</body>
</html>
